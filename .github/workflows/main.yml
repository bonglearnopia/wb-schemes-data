name: Daily Scheme Scraper
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Using a newer version to fix the error
      - name: Install dependencies
        run: npm install axios cheerio
      - name: Run Scraper
        run: node scraper.js
      - name: Run Merge
        run: node merge.js
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add schemes.json scraped.json
          git commit -m "Auto-update schemes" || exit 0
          git push
          
